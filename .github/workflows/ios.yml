name: iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Show toolchain
        run: xcodebuild -version

      # Once the .xcodeproj exists, uncomment to actually build:
      # - name: Build
      #   run: |
      #     xcodebuild \
      #       -scheme TriipMate \
      #       -destination 'platform=iOS Simulator,name=iPhone 15' \
      #       -configuration Debug \
      #       build | xcpretty

      - name: Smoke check — Swift files parse
        run: |
          find TriipMate -name "*.swift" -print | while read f; do
            swift -frontend -parse "$f" > /dev/null || exit 1
          done
